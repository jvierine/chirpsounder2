#
# Configuration for W2NAF, Scranton, PA
#
# 25 MHz ringbuffer data from a USRP N200.
# Initially only detect unknown 100 kHz and 125 kHz chirp sounders
# such as ROTHR and JORN using detect_chirps.py.
#
[config]

receiver_station_name="W2NAF"
realtime=true
channel=["ch0"]
sample_rate=25000000
center_freq=12.5e6
# W2NAF has a 100 GB tmpfs at /mnt/ramdisk. 25 MHz complex int16
# raw voltage is about 100 MB/s, so 950 s uses about 95 GB.
data_dir="/mnt/ramdisk/hf25"
ringbuffer_max_age_sec=950
ringbuffer_cleanup=true
output_dir="/home/hamsci/data/chirpsounder2"
# W2NAF has an internal GPSDO, but the commissioning system does not
# currently report GPS lock. Record anyway and ask Nate to check the
# GPS antenna/GPSDO hardware later.
require_gps_lock=false
gps_lock_timeout_sec=30


[detection]
threshold_snr=13.0
max_simultaneous_detections=5
min_detections=3
step=1
n_samples_per_block=5000000
minimum_frequency_spacing=0.2e6
chirp_rates=[100e3,125e3]


[lfm]
save_raw_voltage=false
downconversion_filter="fir"
range_resolution=2e3
frequency_resolution=50e3
max_range_extent=4000e3
n_downconversion_threads=1
downconversion_block_samples=4000
decimation=625
min_range=200e3
max_range=4000e3
manual_range_extent=true
max_freq=25e6
min_freq=0.5e6
manual_freq_extent=true
storage_snr_threshold=2
maximum_analysis_frequency=25e6
minimum_analysis_frequency=0
sounder_timings=[]


[rtf]
links=[]


[transfer]
copy_to_server=true
copy_destination="https://4.235.86.214/upload.php"
