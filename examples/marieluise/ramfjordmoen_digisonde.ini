[config]
# general config
data_dir = "/dev/shm/hf25"
output_dir = "/data0/"
# there can be more than one channel, so keep this as a list.
channel = ["ch0"]
receiver_station_name="TGO"
sample_rate = 25000000
center_frequency = 12500000

[digisonde]
# Ramfjordmoen Digisonde
# every 7.5 minutes
sounding_interval_sec = 450       
transmitter_station_name="Ramfjordmoen"
# don't save values below this threshold
snr_threshold=2
decimation = 250
freq_start = 1000000
freq_stop = 18000000
freq_step = 50000
ipp_us = 10000
n_ipp = 64
offset_us = -330
wait_for_data = True

