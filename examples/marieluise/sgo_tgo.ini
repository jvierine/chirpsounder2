#
# Only listen to SGO 500 kHz/s transmitter with a known transmit timing.
# Configured to receive in Tromso
#
[config]

# specify that processing occurs on a live ringbuffer
# that continuously gets added more measurements by
# the recorder (and old files are removed to keep buffer a constant size)
# this requires the processing to sometimes wait for more data

receiver_station_name="TGO"
realtime=true
# recording settings and data directory
channel=["ch0"]
sample_rate=25000000.0
center_freq=12.5e6
# use ram dis
data_dir="/dev/shm/hf25"

output_dir="/data0"


[detection]
# options for chirp detection
threshold_snr=13.0
max_simultaneous_detections=5
min_detections=3
step=4
n_samples_per_block=25000000
minimum_frequency_spacing=0.05e6
chirp_rates=[100e3,125e3]


[lfm]
# ionogram calc (spectram parameters)
save_raw_voltage=false
range_resolution=2e3
frequency_resolution=50e3
max_range_extent=1000e3
n_downconversion_threads=2
# LFM complex receiver sample-rate is sample_rate / decimation.
# 625 gives 40 kHz at 25 MHz, twice the previous 20 kHz bandwidth.
decimation=625
min_range=200e3
max_range=1500e3
manual_range_extent=true
max_freq=16e6
min_freq=0.5e6
manual_freq_extent=true
storage_snr_threshold=2
maximum_analysis_frequency=25e6
minimum_analysis_frequency=0
sounder_timings=[[{"chirp-rate":500.0084e3,"rep":60.0,"chirpt":54.0,"id":1,"transmit_name":"SGO"}]]

# display the detected ionograms
#plot_timings=false
#debug_timings=false
[transfer]
copy_to_server=false
copy_destination="username@server.com:/var/dir"


		 
		 
		 
