#
# Server-side quick-look plotting configuration for KHO archive products.
#
# This is used on the central server to plot HDF5 files that have already been
# received under /mnt/shovel/ionosonde. It does not start a receiver.
#

[config]
receiver_station_name="KHO"
realtime=false
serendipitous=false
channel=["ch0"]
sample_rate=25000000
center_freq=12.5e6
data_dir="/mnt/shovel/ionosonde"
output_dir="/mnt/shovel/ionosonde"
kill_path="/home/j/src/chirpsounder2/kill.txt"
plot_timings=false
ringbuffer_cleanup=false

[detection]
threshold_snr=13.0
max_simultaneous_detections=5
min_detections=3
step=1
n_samples_per_block=5000000
minimum_frequency_spacing=0.2e6
chirp_rates=[100e3,125e3]
debug_timings=false

[lfm]
save_raw_voltage=false
downconversion_filter="fir"
range_resolution=2e3
frequency_resolution=50e3
max_range_extent=1000e3
n_downconversion_threads=1
downconversion_block_samples=4000
decimation=625
min_range=800e3
max_range=1900e3
manual_range_extent=true
max_freq=16e6
min_freq=0.5e6
manual_freq_extent=true
storage_snr_threshold=2
maximum_analysis_frequency=25e6
minimum_analysis_frequency=0
sounder_timings=[[{"chirp-rate":500.0084e3,"rep":60.0,"chirpt":54.0,"id":1,"transmit_name":"SGO"}]]

[rtf]
links=[["SGO","KHO"],["Ramfjordmoen","KHO"]]

[transfer]
copy_to_server=false
copy_destination="/var/www/html/iono/"
